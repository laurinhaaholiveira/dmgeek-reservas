<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css">
  <title>Reserva de Mesa - DM Geek Game Bar</title>
</head>

<body>

<h1>Reservar Mesa</h1>

<form id="formReserva">

<label>Nome</label>
<input type="text" id="nome" required>

<label>WhatsApp</label>
<input type="text" id="whatsapp" required>

<label>Data</label>
<input type="date" id="data" required>

<label>Horário</label>
<select id="horario">
<option>14:00</option>
<option>16:00</option>
<option>18:00</option>
<option>20:00</option>
<option>22:00</option>
</select>

<label>Mesa</label>
<select id="mesa">
<option>Mesa RPG</option>
<option>Mesa Boardgame</option>
<option>Mesa Magic</option>
</select>

<button type="submit">Reservar</button>

</form>

<script>

document.getElementById("formReserva").addEventListener("submit", async function(e){

e.preventDefault()

const reserva = {
nome: document.getElementById("nome").value,
whatsapp: document.getElementById("whatsapp").value,
data: document.getElementById("data").value,
horario: document.getElementById("horario").value,
mesa: document.getElementById("mesa").value
}

await fetch("http://localhost:3000/reservar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(reserva)
})

const mensagem = `Olá, fiz uma reserva na DM Geek!
Nome: ${reserva.nome}
Data: ${reserva.data}
Horário: ${reserva.horario}
Mesa: ${reserva.mesa}`

window.open({https://wa.me/5513996276696?text=${encodeURIComponent(mensagem)})

})

</script>

</body>
</html>
